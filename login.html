<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Exam Shield</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 380px;">

        <div class="text-center mb-4">
            <img src="logo.png" alt="Exam Shield Logo" class="logo">
            <h2 class="platform-title">Exam Shield</h2>
            <p class="platform-subtitle">Online Proctored Examination Platform</p>
        </div>
        <h3 class="text-center mb-4">Login</h3>

        <input id="username" class="form-control mb-3" placeholder="Username">

        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-primary w-100" onclick="login()">
            Login
        </button>

        <p class="text-center mt-3 mb-0">
            Not registered?
            <a href="register.html">Create Account</a>
        </p>
    </div>

    <script>

        const API = "http://127.0.0.1:8000";

        // If already logged in, go to index page
        window.onload = () => {
            const token = localStorage.getItem("token");

            if (token) {
                window.location.href = "index.html";
            }
        };

        async function login() {

            const usernameValue = document.getElementById("username").value.trim();
            const passwordValue = document.getElementById("password").value.trim();

            if (!usernameValue || !passwordValue) {
                alert("Please enter username and password");
                return;
            }

            try {

                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: usernameValue,
                        password: passwordValue
                    })
                });

                const data = await res.json();

                console.log(data);

                if (res.ok && data.access_token) {

                    localStorage.setItem("token", data.access_token);

                    if (data.user) {
                        localStorage.setItem("user", JSON.stringify(data.user));
                    }

                    alert("Login Successful ✅");

                    window.location.href = "index.html";

                } else {

                    alert(data.detail || "Invalid Username or Password ❌");
                }

            } catch (error) {

                console.error(error);
                alert("Backend not running or connection failed ❌");
            }
        }

        // Allow Enter key login
        document.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                login();
            }
        });

    </script>

</body>

</html>
