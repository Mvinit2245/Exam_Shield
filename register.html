<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:400px;">

    <div class="text-center mb-4">
            <img src="logo.png" alt="Exam Shield Logo" class="logo">
            <h2 class="platform-title">Exam Shield</h2>
            <p class="platform-subtitle">Online Proctored Examination Platform</p>
        </div>
    <h3 class="text-center">Register</h3>

    <input id="name" class="form-control mb-3" placeholder="Name">
    <input id="username" class="form-control mb-3" placeholder="Username">
    <input id="email" class="form-control mb-3" placeholder="Email">
    <input id="mobile" class="form-control mb-3" placeholder="Mobile No">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">
    <input id="confirm" type="password" class="form-control mb-3" placeholder="Confirm Password">

    <button class="btn btn-success mt-3" onclick="register()">Register</button>

    <p class="mt-3 text-center">
        Already have account? 
        <a href="login.html">Login</a>
    </p>
</div>

<script>

const API = "http://127.0.0.1:8000"

async function register() {

    const data = {
        name: document.getElementById("name").value,
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm").value
    };

    if (data.password !== data.confirm_password) {
        alert("❌ Passwords do not match");
        return;
    }

    try {

        const res = await fetch(`${API}/register`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {

            alert("✅ User Registered Successfully");

            window.location.href = "login.html";

        } else {

            alert("❌ " + (result.detail || "Registration Failed"));
        }

    } catch (error) {

        console.error(error);
        alert("❌ Unable to connect to server");
    }
}

</script>

</body>
</html>
