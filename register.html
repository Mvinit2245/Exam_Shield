<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:400px;">
    <h3 class="text-center">Register</h3>

    <input id="name" class="form-control mt-2" placeholder="Name">
    <input id="username" class="form-control mt-2" placeholder="Username">
    <input id="email" class="form-control mt-2" placeholder="Email">
    <input id="mobile" class="form-control mt-2" placeholder="Mobile No">
    <input id="password" type="password" class="form-control mt-2" placeholder="Password">
    <input id="confirm" type="password" class="form-control mt-2" placeholder="Confirm Password">

    <button class="btn btn-success mt-3" onclick="register()">Register</button>

    <p class="mt-3 text-center">
        Already have account? 
        <a href="login.html">Login</a>
    </p>
</div>

<script>

const API = "http://127.0.0.1:8000"

async function register() {

    const data = {
        name: document.getElementById("name").value,
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm").value
    }

    if (data.password !== data.confirm_password) {
        alert("Passwords do not match")
        return
    }

    const res = await fetch(`${API}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })

    const result = await res.json()

    alert(result.message || result.detail)

    // redirect to login
    window.location.href = "login.html"
}

</script>

</body>
</html>
