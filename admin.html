<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- AutoTable for table PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { background:#f5f6fa; }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .table-danger {
            background:#ffcccc !important;
        }

        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body class="p-4">

<h2 class="mb-3">📊 Admin Dashboard</h2>

<button class="btn btn-danger mb-3" onclick="logout()">Logout</button>
<button class="btn btn-dark mb-3 ms-2" onclick="downloadPDF()">Download Report</button>

<div class="card p-3 mb-4">

<table class="table table-hover text-center" id="reportTable">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Student ID</th>
            <th>Tab</th>
            <th>Face Missing</th>
            <th>Multi Face</th>
            <th>Noise</th>
            <th>Look Left</th>
            <th>Look Right</th>
            <th>Cheating %</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

</div>

<div class="card p-4">
    <h5 class="text-center">📊 Overall Cheating Analysis</h5>
    <canvas id="chart"></canvas>
</div>

<script>

const API = "http://127.0.0.1:8000/exam"

function getHeaders() {
    return {
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

let chart;

// ================= CHEATING FORMULA =================
function calculateCheating(s) {

    let score =
        (s.tab_switch_count * 2) +
        (s.face_not_detected_count * 3) +
        (s.multiple_face_count * 5) +
        (s.sound_detected_count * 2) +
        (s.left_look_count * 3) +
        (s.right_look_count * 3)

    let max = 80

    return Math.min((score / max) * 100, 100).toFixed(1)
}


// ================= LOAD DATA =================
async function loadData() {

    const res = await fetch(`${API}/admin/all_sessions`, {
        headers: getHeaders()
    })

    const data = await res.json()

    // ✅ SORT DESCENDING (HIGH → LOW)
    data.sort((a, b) => calculateCheating(b) - calculateCheating(a))

    let html = ""

    let totalTab = 0
    let totalFace = 0
    let totalMulti = 0
    let totalNoise = 0
    let totalLeft = 0
    let totalRight = 0

    data.forEach(s => {

        let percent = calculateCheating(s)

        let rowClass = percent > 10 ? "table-danger" : ""

        html += `
            <tr class="${rowClass}">
                <td>${s.id}</td>
                <td>${s.user || '-'}</td>
                <td>${s.student_id}</td>
                <td>${s.tab_switch_count}</td>
                <td>${s.face_not_detected_count}</td>
                <td>${s.multiple_face_count}</td>
                <td>${s.sound_detected_count}</td>
                <td>${s.left_look_count || 0}</td>
                <td>${s.right_look_count || 0}</td>
                <td><b>${percent}%</b></td>
            </tr>
        `

        totalTab += s.tab_switch_count
        totalFace += s.face_not_detected_count
        totalMulti += s.multiple_face_count
        totalNoise += s.sound_detected_count
        totalLeft += s.left_look_count || 0
        totalRight += s.right_look_count || 0
    })

    document.getElementById("tableBody").innerHTML = html

    updateChart(totalTab, totalFace, totalMulti, totalNoise, totalLeft, totalRight)
}


// ================= CHART =================
function updateChart(tab, face, multi, noise, left, right) {

    const ctx = document.getElementById('chart')

    if (chart) chart.destroy()

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Tab', 'Face Missing', 'Multi Face', 'Noise', 'Look Left', 'Look Right'],
            datasets: [{
                label: 'Cheating Activity',
                data: [tab, face, multi, noise, left, right]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    })
}


// ================= AUTO REFRESH =================
setInterval(loadData, 5000)
loadData()


// ================= PDF DOWNLOAD (TABLE FORMAT) =================
async function downloadPDF() {

    const { jsPDF } = window.jspdf
    const doc = new jsPDF()

    doc.text("Exam Proctoring Report", 14, 10)

    // ✅ AutoTable (same UI table)
    doc.autoTable({
        html: '#reportTable',
        startY: 20,
        theme: 'grid',
        styles: {
            halign: 'center'
        },
        headStyles: {
            fillColor: [0,0,0]
        }
    })

    doc.save("Exam_Report.pdf")
}


// ================= LOGOUT =================
function logout() {
    localStorage.clear()
    window.location.href = "login.html"
}

</script>

</body>
</html>
