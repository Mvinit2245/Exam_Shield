<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background:#f5f6fa; }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .high { background:#ffcccc !important; }
        .medium { background:#fff3cd !important; }
        .low { background:#d4edda !important; }
    </style>
</head>

<body class="p-4">

<h2>📊 Admin Dashboard</h2>

<button class="btn btn-danger mb-3" onclick="logout()">Logout</button>
<button class="btn btn-dark mb-3 ms-2" onclick="downloadPDF()">Download Report</button>

<div class="card p-3 mb-4">
<table class="table table-hover text-center">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Student ID</th>
            <th>Tab</th>
            <th>Face Missing</th>
            <th>Multi Face</th>
            <th>Noise</th>
            <th>Cheating %</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>
</div>

<div class="card p-4">
    <h5 class="text-center">📊 Overall Cheating Analysis</h5>
    <canvas id="chart"></canvas>
</div>

<script>

const API = "http://127.0.0.1:8000/exam"

function getHeaders() {
    return {
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

let chart;

// ================= CHEATING CALC =================
function calculateCheating(s) {

    let score =
        (s.tab_switch_count * 2) +
        (s.face_not_detected_count * 3) +
        (s.multiple_face_count * 5) +
        (s.sound_detected_count * 2)

    let max = 50 // adjust max

    return Math.min((score / max) * 100, 100).toFixed(1)
}


// ================= LOAD DATA =================
async function loadData() {

    const res = await fetch(`${API}/admin/all_sessions`, {
        headers: getHeaders()
    })

    const data = await res.json()

    // 🔥 SORT DESCENDING (HIGH → LOW CHEATING)
data.sort((a, b) => {
    return calculateCheating(b) - calculateCheating(a)
})

    let html = ""

    let totalTab = 0
    let totalFace = 0
    let totalMulti = 0
    let totalNoise = 0

    data.forEach(s => {

        let percent = calculateCheating(s)

        let rowClass = ""

if (percent > 10) {
    rowClass = "table-danger"   // Bootstrap red
}

        html += `
            <tr class="${rowClass}">
                <td>${s.id}</td>
                <td>${s.user || '-'}</td>
                <td>${s.student_id}</td>
                <td>${s.tab_switch_count}</td>
                <td>${s.face_not_detected_count}</td>
                <td>${s.multiple_face_count}</td>
                <td>${s.sound_detected_count}</td>
                <td><b>${percent}%</b></td>
            </tr>
        `

        totalTab += s.tab_switch_count
        totalFace += s.face_not_detected_count
        totalMulti += s.multiple_face_count
        totalNoise += s.sound_detected_count
    })

    document.getElementById("tableBody").innerHTML = html

    updateChart(totalTab, totalFace, totalMulti, totalNoise)
}


// ================= CHART =================
function updateChart(tab, face, multi, noise) {

    const ctx = document.getElementById('chart')

    if (chart) chart.destroy()

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Tab Switch', 'Face Missing', 'Multiple Faces', 'Noise'],
            datasets: [{
                data: [tab, face, multi, noise],
                backgroundColor: [
                    '#ff6384',
                    '#36a2eb',
                    '#ffce56',
                    '#4bc0c0'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    })
}


// ================= AUTO REFRESH =================
setInterval(loadData, 5000)
loadData()


// ================= PDF =================
async function downloadPDF() {

    const { jsPDF } = window.jspdf
    const doc = new jsPDF()

    const res = await fetch(`${API}/admin/all_sessions`, {
        headers: getHeaders()
    })

    const data = await res.json()

    let y = 10
    doc.text("Exam Report", 10, y)
    y += 10

    data.forEach(s => {

        let percent = calculateCheating(s)

        doc.text(
            `User: ${s.user} | Student: ${s.student_id} | Cheating: ${percent}%`,
            10,
            y
        )
        y += 10
    })

    doc.save("report.pdf")
}


// ================= LOGOUT =================
function logout() {
    localStorage.clear()
    window.location.href = "login.html"
}

</script>

</body>
</html>
