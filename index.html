<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam Shield APP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <style>
        body { background: #f5f6fa; }
        video { width: 100%; border-radius: 10px; }
        .card { margin-top: 20px; }
    </style>
</head>

<body>

<!-- ✅ LOGIN SECTION -->
<div class="container mt-5" id="loginSection">
    <div class="card p-4">
        <h3 class="text-center">Login</h3>

        <input id="username" class="form-control mt-2" placeholder="Username">
        <input id="password" type="password" class="form-control mt-2" placeholder="Password">

        <button class="btn btn-success mt-3" onclick="login()">Login</button>
    </div>
</div>

<!-- ✅ APP SECTION -->
<div id="appSection" style="display:none;">

<div class="container mt-4">

    <button class="btn btn-danger float-end" onclick="logout()">Logout</button>

    <h2 class="text-center"> Online Exam Proctoring</h2>

    <div class="card p-4">

        <label>Student ID</label>
        <input id="studentId" class="form-control">

        <button class="btn btn-primary mt-3" onclick="startExam()">Start Exam</button>

        <p class="mt-3">
            Session ID :
            <span id="sessionId" class="badge bg-success"></span>
        </p>

    </div>

    <div class="row">

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Camera Monitor</h5>
                <video id="video" autoplay playsinline muted></video>

                <p class="mt-3">
                    Face Status :
                    <span id="faceStatus" class="badge bg-secondary">Waiting</span>
                </p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Microphone Monitor</h5>

                <p>Noise Level : <span id="noiseLevel">0</span></p>

                <p>
                    Noise Status :
                    <span id="noiseStatus" class="badge bg-secondary">Waiting</span>
                </p>
            </div>
        </div>

    </div>

    <div class="card p-4">
        <h5>Exam Report</h5>
        <button class="btn btn-dark" onclick="getReport()">Get Report</button>
        <pre id="reportBox" class="mt-3"></pre>
    </div>

</div>
</div>

<script>

const API = "http://127.0.0.1:8000/exam"

let sessionId = null
let model = null
let videoStream = null

// ✅ AUTO LOGIN CHECK
window.onload = () => {
    const token = localStorage.getItem("token")
    if (token) showApp()
}

// ✅ HEADERS
function getHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

// ✅ LOGIN (FIXED)
async function login() {

    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try {
        const res = await fetch("http://127.0.0.1:8000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        })

        const data = await res.json()

        if (data.access_token) {
            localStorage.setItem("token", data.access_token)
            showApp()
        } else {
            alert("Login failed")
        }

    } catch (err) {
        alert("Backend not running")
    }
}

// ✅ LOGOUT
function logout() {
    localStorage.removeItem("token")

    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop())
    }

    location.reload()
}

// ✅ UI SWITCH
function showApp() {
    document.getElementById("loginSection").style.display = "none"
    document.getElementById("appSection").style.display = "block"
}

// ✅ START EXAM
async function startExam() {

    const studentId = document.getElementById("studentId").value

    if (!studentId) {
        alert("Enter student ID")
        return
    }

    try {

        const res = await fetch(`${API}/start_exam`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({
                student_id: studentId
            })
        })

        const data = await res.json()

        sessionId = data.session_id

        document.getElementById("sessionId").innerText = sessionId

        await startCamera()
        await loadModel()

        startFaceDetection()
        startNoiseDetection()

    } catch (err) {
        console.error(err)
        alert("Backend connection failed")
    }
}

// CAMERA
async function startCamera() {
    videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    const video = document.getElementById("video")
    video.srcObject = videoStream
}

// MODEL
async function loadModel() {
    model = await blazeface.load()
}

// FACE DETECTION
function startFaceDetection() {

    const video = document.getElementById("video")

    setInterval(async () => {

        if (!model || !video.srcObject) return

        const predictions = await model.estimateFaces(video, false)
        const faceCount = predictions.length

        const faceStatus = document.getElementById("faceStatus")

        if (faceCount === 0) {
            faceStatus.innerText = "Face Missing"
            faceStatus.className = "badge bg-danger"
        }
        else if (faceCount > 1) {
            faceStatus.innerText = "Multiple Faces"
            faceStatus.className = "badge bg-warning"
        }
        else {
            faceStatus.innerText = "Single Face"
            faceStatus.className = "badge bg-success"
        }

        if (sessionId) {
            fetch(`${API}/face_detection/${sessionId}`, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify({ face_count: faceCount })
            })
        }

    }, 3000)
}

// NOISE
function startNoiseDetection() {

    const audioContext = new AudioContext()
    const microphone = audioContext.createMediaStreamSource(videoStream)
    const analyser = audioContext.createAnalyser()

    microphone.connect(analyser)

    const dataArray = new Uint8Array(analyser.frequencyBinCount)

    setInterval(() => {

        analyser.getByteFrequencyData(dataArray)
        let volume = dataArray.reduce((a, b) => a + b) / dataArray.length

        document.getElementById("noiseLevel").innerText = volume.toFixed(2)

        if (volume > 60 && sessionId) {
            fetch(`${API}/event/${sessionId}`, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify({ event_type: "NOISE" })
            })
        }

    }, 2000)
}

// TAB SWITCH
document.addEventListener("visibilitychange", function () {
    if (document.hidden && sessionId) {
        fetch(`${API}/event/${sessionId}`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({ event_type: "TAB_SWITCH" })
        })
    }
})

// REPORT
async function getReport() {

    const res = await fetch(`${API}/report/${sessionId}`, {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })

    const data = await res.json()

    document.getElementById("reportBox").innerText =
        JSON.stringify(data, null, 2)
}

</script>

</body>
</html>
