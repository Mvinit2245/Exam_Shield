<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam Shield APP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <style>
        body { background: #f5f6fa; }
        video { width: 100%; border-radius: 10px; }
        .card { margin-top: 20px; }
    </style>
</head>

<body>

<!-- ✅ REGISTER SECTION -->
<div class="container mt-3" id="registerSection">
    <div class="card p-4">
        <h3 class="text-center">Register</h3>

        <input id="name" class="form-control mt-2" placeholder="Name">
        <input id="regUsername" class="form-control mt-2" placeholder="Username">
        <input id="email" class="form-control mt-2" placeholder="Email">
        <input id="mobile" class="form-control mt-2" placeholder="Mobile No">
        <input id="regPassword" type="password" class="form-control mt-2" placeholder="Password">
        <input id="confirmPassword" type="password" class="form-control mt-2" placeholder="Confirm Password">

        <button class="btn btn-success mt-3" onclick="register()">Register</button>
    </div>
</div>

<!-- ✅ LOGIN SECTION -->
<div class="container mt-3" id="loginSection">
    <div class="card p-4">
        <h3 class="text-center">Login</h3>

        <input id="username" class="form-control mt-2" placeholder="Username">
        <input id="password" type="password" class="form-control mt-2" placeholder="Password">

        <button class="btn btn-primary mt-3" onclick="login()">Login</button>
    </div>
</div>

<!-- ✅ APP SECTION -->
<div id="appSection" style="display:none;">

<div class="container mt-4">

    <button class="btn btn-danger float-end" onclick="logout()">Logout</button>

    <h2 class="text-center">Online Exam Proctoring</h2>

    <!-- ✅ USER DETAILS -->
    <div class="card p-3">
        <h5>User Details</h5>
        <p>Name: <span id="uName"></span></p>
        <p>Username: <span id="uUsername"></span></p>
        <p>Email: <span id="uEmail"></span></p>
        <p>Mobile: <span id="uMobile"></span></p>
    </div>

    <div class="card p-4">

        <label>Student ID</label>
        <input id="studentId" class="form-control">

        <button class="btn btn-primary mt-3" onclick="startExam()">Start Exam</button>

        <p class="mt-3">
            Session ID :
            <span id="sessionId" class="badge bg-success"></span>
        </p>

    </div>

    <div class="row">

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Camera Monitor</h5>
                <video id="video" autoplay playsinline muted></video>

                <p class="mt-3">
                    Face Status :
                    <span id="faceStatus" class="badge bg-secondary">Waiting</span>
                </p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Microphone Monitor</h5>

                <p>Noise Level : <span id="noiseLevel">0</span></p>

                <p>
                    Noise Status :
                    <span id="noiseStatus" class="badge bg-secondary">Waiting</span>
                </p>
            </div>
        </div>

    </div>

    <div class="card p-4">
        <h5>Exam Report</h5>
        <button class="btn btn-dark" onclick="getReport()">Get Report</button>
        <pre id="reportBox" class="mt-3"></pre>
    </div>

</div>
</div>

<script>

const API = "http://127.0.0.1:8000"
let sessionId = null
let model = null
let videoStream = null

// ================= AUTO LOGIN =================
window.onload = () => {
    const token = localStorage.getItem("token")
    if (token) showApp()
}

// ================= HEADERS =================
function getHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

// ================= REGISTER =================
async function register() {

    const data = {
        name: document.getElementById("name").value,
        username: document.getElementById("regUsername").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        password: document.getElementById("regPassword").value,
        confirm_password: document.getElementById("confirmPassword").value
    }

    if (data.password !== data.confirm_password) {
        alert("Passwords do not match")
        return
    }

    const res = await fetch(`${API}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })

    const result = await res.json()
    alert(result.message || result.detail)
}

// ================= LOGIN =================
async function login() {

    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try {

        const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        })

        const data = await res.json()

        if (data.access_token) {

            localStorage.setItem("token", data.access_token)

            // ✅ SHOW USER DETAILS
            document.getElementById("uName").innerText = data.user.name
            document.getElementById("uUsername").innerText = data.user.username
            document.getElementById("uEmail").innerText = data.user.email
            document.getElementById("uMobile").innerText = data.user.mobile

            showApp()

        } else {
            alert("Login failed")
        }

    } catch (err) {
        alert("Backend not running")
    }
}

// ================= LOGOUT =================
function logout() {
    localStorage.clear()

    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop())
    }

    location.reload()
}

// ================= UI SWITCH =================
function showApp() {
    document.getElementById("registerSection").style.display = "none"
    document.getElementById("loginSection").style.display = "none"
    document.getElementById("appSection").style.display = "block"
}

// ================= START EXAM =================
async function startExam() {

    const studentId = document.getElementById("studentId").value

    const res = await fetch(`${API}/exam/start_exam`, {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({student_id: studentId})
    })

    const data = await res.json()

    sessionId = data.session_id
    document.getElementById("sessionId").innerText = sessionId

    await startCamera()
    await loadModel()

    startFaceDetection()
    startNoiseDetection()
}

// ================= CAMERA =================
async function startCamera() {
    videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    document.getElementById("video").srcObject = videoStream
}

// ================= MODEL =================
async function loadModel() {
    model = await blazeface.load()
}

// ================= FACE =================
function startFaceDetection() {
    const video = document.getElementById("video")

    setInterval(async () => {

        if (!model || !video.srcObject) return

        const predictions = await model.estimateFaces(video, false)
        const faceCount = predictions.length

        if (sessionId) {
            fetch(`${API}/exam/face_detection/${sessionId}`, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify({ face_count: faceCount })
            })
        }

    }, 3000)
}

// ================= NOISE =================
function startNoiseDetection() {

    const audioContext = new AudioContext()
    const mic = audioContext.createMediaStreamSource(videoStream)
    const analyser = audioContext.createAnalyser()

    mic.connect(analyser)

    const dataArray = new Uint8Array(analyser.frequencyBinCount)

    setInterval(() => {

        analyser.getByteFrequencyData(dataArray)
        let volume = dataArray.reduce((a, b) => a + b) / dataArray.length

        if (volume > 60 && sessionId) {
            fetch(`${API}/exam/event/${sessionId}`, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify({ event_type: "NOISE" })
            })
        }

    }, 2000)
}

// ================= TAB =================
document.addEventListener("visibilitychange", function () {
    if (document.hidden && sessionId) {
        fetch(`${API}/exam/event/${sessionId}`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({ event_type: "TAB_SWITCH" })
        })
    }
})

// ================= REPORT =================
async function getReport() {

    const res = await fetch(`${API}/exam/report/${sessionId}`, {
        headers: getHeaders()
    })

    const data = await res.json()

    document.getElementById("reportBox").innerText =
        JSON.stringify(data, null, 2)
}

</script>

</body>
</html>
