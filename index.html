<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>AI Exam Proctoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <style>
        body {
            background: #f5f6fa;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        .card {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center">AI Online Exam Proctoring</h2>


        <div class="card p-4">

            <label>Student ID</label>

            <input id="studentId" class="form-control">

            <button class="btn btn-primary mt-3" onclick="startExam()">
                Start Exam
            </button>

            <p class="mt-3">
                Session ID :
                <span id="sessionId" class="badge bg-success"></span>
            </p>

        </div>



        <div class="row">

            <div class="col-md-6">

                <div class="card p-3">

                    <h5>Camera Monitor</h5>

                    <video id="video" autoplay playsinline muted></video>

                    <p class="mt-3">
                        Face Status :
                        <span id="faceStatus" class="badge bg-secondary">Waiting</span>
                    </p>

                </div>

            </div>



            <div class="col-md-6">

                <div class="card p-3">

                    <h5>Microphone Monitor</h5>

                    <p>
                        Noise Level :
                        <span id="noiseLevel">0</span>
                    </p>

                    <p>
                        Noise Status :
                        <span id="noiseStatus" class="badge bg-secondary">Waiting</span>
                    </p>

                </div>

            </div>

        </div>



        <div class="card p-4">

            <h5>Exam Report</h5>

            <button class="btn btn-dark" onclick="getReport()">Get Report</button>

            <pre id="reportBox" class="mt-3"></pre>

        </div>

    </div>


    <script>

        const API = "http://127.0.0.1:8000/exam"

        let sessionId = null
        let model = null
        let videoStream = null



        async function startExam() {

            const studentId = document.getElementById("studentId").value

            if (!studentId) {
                alert("Enter student ID")
                return
            }

            try {

                const res = await fetch(`${API}/start_exam`, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        student_id: studentId
                    })

                })

                const data = await res.json()

                sessionId = data.session_id

                document.getElementById("sessionId").innerText = sessionId

                await startCamera()

                await loadModel()

                startFaceDetection()

                startNoiseDetection()

            } catch (err) {

                console.error(err)
                alert("Backend connection failed")

            }

        }



        async function startCamera() {

            try {

                videoStream = await navigator.mediaDevices.getUserMedia({

                    video: true,
                    audio: true

                })

                const video = document.getElementById("video")

                video.srcObject = videoStream

                await new Promise(resolve => {
                    video.onloadedmetadata = resolve
                })

            } catch (err) {

                console.error(err)
                alert("Camera/Microphone permission denied")

            }

        }



        async function loadModel() {

            model = await blazeface.load()

        }



        function startFaceDetection() {

            const video = document.getElementById("video")

            setInterval(async () => {

                if (!model || !video.srcObject) return

                const predictions = await model.estimateFaces(video, false)

                const faceCount = predictions.length

                const faceStatus = document.getElementById("faceStatus")


                if (faceCount === 0) {

                    faceStatus.innerText = "Face Missing"
                    faceStatus.className = "badge bg-danger"

                }

                else if (faceCount > 1) {

                    faceStatus.innerText = "Multiple Faces"
                    faceStatus.className = "badge bg-warning"

                }

                else {

                    faceStatus.innerText = "Single Face"
                    faceStatus.className = "badge bg-success"

                }


                if (sessionId) {

                    fetch(`${API}/face_detection/${sessionId}`, {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            face_count: faceCount
                        })

                    })

                }

            }, 3000)

        }



        function startNoiseDetection() {

            const audioContext = new AudioContext()

            const microphone = audioContext.createMediaStreamSource(videoStream)

            const analyser = audioContext.createAnalyser()

            microphone.connect(analyser)

            const dataArray = new Uint8Array(analyser.frequencyBinCount)

            setInterval(() => {

                analyser.getByteFrequencyData(dataArray)

                let volume = dataArray.reduce((a, b) => a + b) / dataArray.length

                document.getElementById("noiseLevel").innerText = volume.toFixed(2)

                const noiseStatus = document.getElementById("noiseStatus")


                if (volume > 60) {

                    noiseStatus.innerText = "Noise Detected"
                    noiseStatus.className = "badge bg-danger"

                    if (sessionId) {

                        fetch(`${API}/event/${sessionId}`, {

                            method: "POST",

                            headers: {
                                "Content-Type": "application/json"
                            },

                            body: JSON.stringify({
                                event_type: "NOISE"
                            })

                        })

                    }

                }

                else {

                    noiseStatus.innerText = "Normal"
                    noiseStatus.className = "badge bg-success"

                }

            }, 2000)

        }



        document.addEventListener("visibilitychange", function () {

            if (document.hidden && sessionId) {

                fetch(`${API}/event/${sessionId}`, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        event_type: "TAB_SWITCH"
                    })

                })

            }

        })



        async function getReport() {

            if (!sessionId) {
                alert("Start exam first")
                return
            }

            const res = await fetch(`${API}/report/${sessionId}`)

            const data = await res.json()

            document.getElementById("reportBox").innerText =
                JSON.stringify(data, null, 2)

        }

    </script>

</body>

</html>
